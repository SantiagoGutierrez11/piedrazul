server:
  port: 8090

spring:
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  application:
    name: api-gateway

  # --- Keycloak como OAuth2 Resource Server ---
  # issuer-uri  → DEBE coincidir con el claim "iss" del token (URL pública con la que
  #               el frontend/Postman piden el token: localhost:8180). Solo se usa para validar.
  # jwk-set-uri → desde dónde el gateway descarga las llaves públicas. En Docker se sobrescribe
  #               con http://keycloak:8080 (red interna); en local usa localhost:8180.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:  ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/piedrazul}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/piedrazul/protocol/openid-connect/certs}

  cloud:
    gateway:
      # --- Configuración global de CORS ---
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"   # Frontend React en desarrollo
              - "http://localhost:5173"   # Frontend Vite
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # --- Rutas hacia cada microservicio ---
      # Cada URI usa una variable de entorno con default a localhost, para que el
      # gateway funcione tanto corriendo localmente como dentro de Docker.
      routes:

        # Identity Service
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/identity/**

        # Patient Service
        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/patients/**

        # Medical Staff Service
        - id: medical-staff-service
          uri: ${MEDICAL_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/medical/**

        # Configuration Service
        - id: configuration-service
          uri: ${CONFIGURATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/configuration/**

        # Appointment Service
        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/appointments/**

# --- Swagger ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# --- URLs internas de los servicios (usadas por el Saga) ---
services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  patient:
    url: ${PATIENT_SERVICE_URL:http://localhost:8083}
  medical-staff:
    url: ${MEDICAL_SERVICE_URL:http://localhost:8082}
  appointment:
    url: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
