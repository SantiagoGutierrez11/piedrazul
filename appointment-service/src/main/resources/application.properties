server.port=8084
spring.application.name=appointment-service


# --- RabbitMq ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=piedrazul
spring.rabbitmq.password=piedrazul_pass

rabbitmq.exchange=piedrazul.exchange
rabbitmq.routing-key.appointment-created=appointment.created
rabbitmq.queue.user-registered=appointment.user.registered

# --- Base de datos ---
spring.datasource.url=jdbc:postgresql://localhost:5435/appointment_db
spring.datasource.username=appointment_user
spring.datasource.password=appointment_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Keycloak (Resource Server) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/piedrazul}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/piedrazul/protocol/openid-connect/certs}

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Redis ---
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- Medical Staff Service ---
# En Docker se sobrescribe con MEDICAL_STAFF_SERVICE_URL (red interna).
medical-staff-service.url=${MEDICAL_STAFF_SERVICE_URL:http://localhost:8082/api/v1/medical}

# --- Identity Service (fallback de validación de usuarios) ---
identity-service.url=${IDENTITY_SERVICE_URL:http://localhost:8081/api/v1/identity}
